<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="favicon.ico">
    <title>LazarusTech RS - Računarske Usluge u Srbiji</title>
    <meta name="description" content="LazarusTech RS - Specijalizovani za prodaju komponenti, popravku, sastavku, čišćenje i recikliranje računara. Dostava samo za Srbiju.">
    <meta name="keywords" content="računar, komponente, popravka, sastavka, usluge, Srbija, LazarusTech">
    <script>
        // Redirect to homepage
        window.location.href = './homepage/index.html';
    </script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
            background: linear-gradient(135deg, #361652 0%, #7B2CBF 100%);
            color: white;
            margin: 0;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        
        .loading-container {
            text-align: center;
        }
        
        .logo {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: linear-gradient(135deg, #7B2CBF, #DA1C8C);
            margin: 0 auto 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            box-shadow: 0 8px 32px rgba(123, 44, 191, 0.3);
            animation: spin 3s linear infinite;
        }
        
        h1 {
            font-size: 32px;
            font-weight: 700;
            margin: 0 0 15px;
            letter-spacing: -0.5px;
        }
        
        p {
            font-size: 16px;
            opacity: 0.95;
            margin: 0 0 30px;
        }
        
        .loading-text {
            font-size: 14px;
            opacity: 0.8;
        }
        
        @keyframes spin {
            from {
                transform: rotate(0deg);
            }
            to {
                transform: rotate(360deg);
            }
        }
        
        @keyframes pulse {
            0%,
            100% {
                opacity: 0.7;
            }
            50% {
                opacity: 1;
            }
        }
        
        .dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: white;
            margin: 0 4px;
            animation: pulse 1.5s infinite;
        }
        
        .dot:nth-child(2) {
            animation-delay: 0.2s;
        }
        
        .dot:nth-child(3) {
            animation-delay: 0.4s;
        }
        
        a {
            color: white;
            text-decoration: none;
            padding: 12px 28px;
            border: 2px solid white;
            border-radius: 8px;
            display: inline-block;
            transition: all 0.3s ease;
            font-weight: 600;
        }
        
        a:hover {
            background: white;
            color: #7B2CBF;
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.2);
        }
        
        .no-script {
            display: none;
        }
    </style>
</head>

<body>
    <div class="loading-container">
        <div class="logo">L</div>
        <h1>LazarusTech RS</h1>
        <p>Učitavanje vaših usluga...</p>

        <div class="loading-text">
            <span class="dot"></span>
            <span class="dot"></span>
            <span class="dot"></span>
        </div>
    </div>

    <noscript>
        <div class="loading-container no-script" style="display: flex; flex-direction: column;">
            <h1>Dobrodošli u LazarusTech RS</h1>
            <p>JavaScript je potreban za pravilno funkcionisanje ove veb stranice.</p>
            <a href="./homepage/index.html">Continue to Homepage</a>
        </div>
    </noscript>
</body>

</html>
